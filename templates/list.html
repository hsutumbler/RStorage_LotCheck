{% extends "base.html" %}

{% block title %}批號列表 - 試劑批號確認系統{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <!-- 頁面標題和統計 -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <div class="position-relative d-inline-block mb-2">
                    <h2 class="mb-1 text-gradient">
                        
                    </h2>
                    <div class="position-absolute top-0 start-0 w-100 h-100 bg-white bg-opacity-10 rounded-pill blur-sm" style="filter: blur(20px); z-index: -1;"></div>
                </div>
                <p class="text-muted mb-0 fs-5"></p>
            </div>

        </div>
        
        <!-- 篩選和搜尋 -->
        <div class="card mb-4 glow">
            <div class="card-header">
                <div class="d-flex align-items-center">
                    <div class="bg-primary bg-opacity-20 rounded-circle p-2 me-3">
                        
                    </div>
                    <h5 class="mb-0 text-white">篩選與搜尋</h5>
                </div>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="filterItem" class="form-label">
                            
                            檢驗項目篩選
                        </label>
                        <select class="form-select" id="filterItem">
                            <option value="">全部項目</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="filterStatus" class="form-label">
                            
                            狀態篩選
                        </label>
                        <select class="form-select" id="filterStatus">
                            <option value="">全部狀態</option>
                            <option value="active">使用中</option>
                            <option value="expired">已過期</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="searchInput" class="form-label">
                            
                            關鍵字搜尋
                        </label>
                        <div class="position-relative">
                            <input type="text" class="form-control" id="searchInput" 
                                   placeholder="搜尋項目名稱或批號...">
                            <div class="position-absolute top-50 end-0 translate-middle-y me-3">
                                
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        

        
        <!-- 批號列表表格 -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <div class="bg-info bg-opacity-20 rounded-circle p-2 me-3">
                        
                    </div>
                    <div>
                        <h5 class="mb-0 text-white">批號詳細資訊</h5>
                        <p class="mb-0 opacity-75">查看所有試劑批號的詳細狀態</p>
                    </div>
                </div>
                <div class="d-flex gap-3 align-items-center">
                    <button class="btn btn-outline-secondary btn-sm" id="refreshBtn">
                        
                        重新整理
                    </button>
                    <span class="badge bg-primary px-3 py-2" id="displayCount">顯示 0 筆</span>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0" id="reagentsTable">
                        <thead>
                            <tr>
                                <th>檢驗項目</th>
                                <th>批號</th>
                                <th>有效期限</th>
                                <th>數量</th>
                                <th>供應商</th>
                                <th>單位</th>
                                <th>儲存時間</th>
                                <th>狀態</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="9" class="text-center text-muted py-5">
                                    <div class="loading-spinner mx-auto mb-3"></div>
                                    <p class="mb-0">正在載入資料...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- 分頁控制 -->
        <div class="d-flex justify-content-between align-items-center mt-4" id="paginationContainer" style="display: none;">
            <div class="text-muted">
                顯示第 <span id="startIndex">1</span> 到 <span id="endIndex">10</span> 筆，共 <span id="totalItems">0</span> 筆
            </div>
            <nav aria-label="分頁導航">
                <ul class="pagination pagination-sm mb-0" id="pagination">
                    <!-- 分頁按鈕將在這裡動態生成 -->
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- 詳細資訊模態框 -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <div class="d-flex align-items-center">
                    <div class="bg-info bg-opacity-20 rounded-circle p-2 me-3">
                        
                    </div>
                    <h5 class="modal-title text-white">批號詳細資訊</h5>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalContent">
                <!-- 詳細資訊將在這裡顯示 -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// 全域變數
let allReagents = [];
let filteredReagents = [];
let currentPage = 1;
const itemsPerPage = 20;

// 工具函數 - 必須在最前面定義
function isExpired(dateString) {
    if (!dateString) return false;
    const expDate = new Date(dateString);
    const today = new Date();
    return expDate < today;
}

function formatDate(dateString) {
    if (!dateString) return '';
    const date = new Date(dateString);
    return date.toLocaleDateString('zh-TW');
}

function formatDateTime(dateString) {
    if (!dateString) return '';
    const date = new Date(dateString);
    return date.toLocaleString('zh-TW');
}

// 主要功能函數
function loadAllReagents() {
    const refreshBtn = document.getElementById('refreshBtn');
    refreshBtn.disabled = true;
    refreshBtn.innerHTML = '<i class="bi bi-hourglass-split me-1"></i>載入中...';
    
    fetch('/api/get_all_reagents')
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                allReagents = data.data;
                updateStatistics();
                populateItemFilter();
                filterReagents();
            } else {
                showAlert(`
                    <div class="d-flex align-items-center">
                        <i class="bi bi-exclamation-triangle-fill text-danger me-2 fs-4"></i>
                        <div>
                            <strong>載入資料失敗</strong><br>
                            <small>請稍後再試</small>
                        </div>
                    </div>
                `, 'danger');
            }
        })
        .catch(error => {
            console.error('載入資料時發生錯誤:', error);
            showAlert(`
                <div class="d-flex align-items-center">
                    <i class="bi bi-exclamation-triangle-fill text-danger me-2 fs-4"></i>
                    <div>
                        <strong>載入資料失敗</strong><br>
                        <small>請稍後再試</small>
                    </div>
                </div>
            `, 'danger');
        })
        .finally(() => {
            refreshBtn.disabled = false;
            refreshBtn.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i>重新整理';
        });
}

function updateStatistics() {
    // 統計功能已移除，此函數保留以避免錯誤
    // 原本的統計卡片已被移除，不再需要更新統計數據
}

function populateItemFilter() {
    const filterSelect = document.getElementById('filterItem');
    const items = [...new Set(allReagents.map(r => r.item))].sort();
    
    // 清空現有選項（保留「全部項目」）
    filterSelect.innerHTML = '<option value="">全部項目</option>';
    
    // 添加項目選項
    items.forEach(item => {
        const option = document.createElement('option');
        option.value = item;
        option.textContent = item;
        filterSelect.appendChild(option);
    });
}

function filterReagents() {
    const itemFilter = document.getElementById('filterItem').value;
    const statusFilter = document.getElementById('filterStatus').value;
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    
    filteredReagents = allReagents.filter(reagent => {
        // 項目篩選
        if (itemFilter && reagent.item !== itemFilter) return false;
        
        // 狀態篩選
        if (statusFilter) {
            const expired = isExpired(reagent.expiration_date);
            if (statusFilter === 'active' && expired) return false;
            if (statusFilter === 'expired' && !expired) return false;
        }
        
        // 關鍵字搜尋
        if (searchTerm) {
            const searchText = `${reagent.item} ${reagent.lot_number}`.toLowerCase();
            if (!searchText.includes(searchTerm)) return false;
        }
        
        return true;
    });
    
    // 重新排序（按儲存時間降序）
    filteredReagents.sort((a, b) => new Date(b.stored_date) - new Date(a.stored_date));
    
    // 重置分頁並顯示結果
    currentPage = 1;
    displayReagents();
}

function displayReagents() {
    const tbody = document.querySelector('#reagentsTable tbody');
    const startIndex = (currentPage - 1) * itemsPerPage;
    const endIndex = startIndex + itemsPerPage;
    const pageReagents = filteredReagents.slice(startIndex, endIndex);
    
    if (pageReagents.length === 0) {
                 tbody.innerHTML = `
             <tr>
                 <td colspan="9" class="text-center text-muted py-5">
                     <div class="bg-light bg-opacity-50 rounded-circle p-4 mx-auto mb-3" style="width: 80px; height: 80px;">
                         <i class="bi bi-inbox display-4 text-muted"></i>
                     </div>
                     <p class="mb-0 fs-5">沒有找到符合條件的批號</p>
                     <small class="text-muted">請嘗試調整篩選條件或搜尋關鍵字</small>
                 </td>
             </tr>
         `;
        document.getElementById('paginationContainer').style.display = 'none';
        return;
    }
    
    // 顯示表格資料
    tbody.innerHTML = pageReagents.map(reagent => {
        const expired = isExpired(reagent.expiration_date);
        const expDate = new Date(reagent.expiration_date);
        const today = new Date();
        const daysUntilExpiry = Math.ceil((expDate - today) / (1000 * 60 * 60 * 24));
        
        let statusClass = 'status-used';
        let statusText = '使用中';
        let statusIcon = 'bi-check-circle';
        
        if (expired) {
            statusClass = 'status-expired';
            statusText = '已過期';
            statusIcon = 'bi-exclamation-triangle';
        } else if (daysUntilExpiry <= 30) {
            statusClass = 'status-expired';
            statusText = `即將過期 (${daysUntilExpiry}天)`;
            statusIcon = 'bi-clock';
        }
        
        return `
            <tr class="${expired ? 'expired' : ''}">
                <td>
                    <div class="d-flex align-items-center">
                        <div class="bg-primary bg-opacity-10 rounded-circle p-2 me-3">
                            <i class="bi bi-flask text-primary"></i>
                        </div>
                        <strong>${reagent.item}</strong>
                    </div>
                </td>
                <td>
                    <code class="fs-6 bg-light px-3 py-2 rounded-pill">${reagent.lot_number}</code>
                </td>
                <td>
                    <span class="${expired ? 'text-danger fw-bold' : ''}">
                        ${formatDate(reagent.expiration_date)}
                    </span>
                    ${daysUntilExpiry <= 30 && !expired ? 
                        `<br><small class="text-warning">剩餘 ${daysUntilExpiry} 天</small>` : ''}
                </td>
                                 <td>
                     <span class="badge bg-secondary bg-opacity-75 fs-6 px-3 py-2">
                         
                         ${reagent.quantity || 1}
                     </span>
                 </td>
                 <td>
                     <small class="text-muted">
                         ${reagent.supplier || '-'}
                     </small>
                 </td>
                 <td>
                     <small class="text-muted">
                         ${reagent.unit || '-'}
                     </small>
                 </td>
                 <td>
                     <small class="text-muted">
                         
                         ${formatDateTime(reagent.stored_date)}
                     </small>
                 </td>
                <td>
                    <span class="status-badge ${statusClass}">
                        
                        ${statusText}
                    </span>
                </td>
                <td>
                    <button class="btn btn-outline-success btn-sm" onclick="printReagentLabel('${reagent.item}', '${reagent.lot_number}', '${reagent.expiration_date}', '${reagent.stored_date}', ${reagent.quantity || 1})">
                        <i class="bi bi-printer me-1"></i>補印標籤
                    </button>
                </td>
            </tr>
        `;
    }).join('');
    
    // 更新分頁資訊
    updatePagination();
}

function updatePagination() {
    const totalItems = filteredReagents.length;
    const totalPages = Math.ceil(totalItems / itemsPerPage);
    const startIndex = (currentPage - 1) * itemsPerPage + 1;
    const endIndex = Math.min(currentPage * itemsPerPage, totalItems);
    
    // 更新顯示計數
    document.getElementById('displayCount').textContent = `顯示 ${startIndex}-${endIndex} 筆`;
    document.getElementById('startIndex').textContent = startIndex;
    document.getElementById('endIndex').textContent = endIndex;
    document.getElementById('totalItems').textContent = totalItems;
    
    // 顯示分頁控制
    document.getElementById('paginationContainer').style.display = 'flex';
    
    // 生成分頁按鈕
    const pagination = document.getElementById('pagination');
    pagination.innerHTML = '';
    
    // 上一頁按鈕
    const prevBtn = document.createElement('li');
    prevBtn.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
    prevBtn.innerHTML = `<a class="page-link" href="#" onclick="changePage(${currentPage - 1})">上一頁</a>`;
    pagination.appendChild(prevBtn);
    
    // 頁碼按鈕
    const startPage = Math.max(1, currentPage - 2);
    const endPage = Math.min(totalPages, currentPage + 2);
    
    for (let i = startPage; i <= endPage; i++) {
        const pageBtn = document.createElement('li');
        pageBtn.className = `page-item ${i === currentPage ? 'active' : ''}`;
        pageBtn.innerHTML = `<a class="page-link" href="#" onclick="changePage(${i})">${i}</a>`;
        pagination.appendChild(pageBtn);
    }
    
    // 下一頁按鈕
    const nextBtn = document.createElement('li');
    nextBtn.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
    nextBtn.innerHTML = `<a class="page-link" href="#" onclick="changePage(${currentPage + 1})">下一頁</a>`;
    pagination.appendChild(nextBtn);
}

function changePage(page) {
    const totalPages = Math.ceil(filteredReagents.length / itemsPerPage);
    if (page >= 1 && page <= totalPages) {
        currentPage = page;
        displayReagents();
        // 滾動到表格頂部
        document.getElementById('reagentsTable').scrollIntoView({ behavior: 'smooth' });
    }
}

function showDetail(lotNumber) {
    const reagent = allReagents.find(r => r.lot_number === lotNumber);
    if (!reagent) return;
    
    const expired = isExpired(reagent.expiration_date);
    const expDate = new Date(reagent.expiration_date);
    const today = new Date();
    const daysUntilExpiry = Math.ceil((expDate - today) / (1000 * 60 * 60 * 24));
    
    let statusClass = 'status-used';
    let statusText = '使用中';
    let statusIcon = 'bi-check-circle';
    
    if (expired) {
        statusClass = 'status-expired';
        statusText = '已過期';
        statusIcon = 'bi-exclamation-triangle';
    } else if (daysUntilExpiry <= 30) {
        statusClass = 'status-expired';
        statusText = `即將過期 (${daysUntilExpiry}天)`;
        statusIcon = 'bi-clock';
    }
    
    const modalContent = document.getElementById('modalContent');
    modalContent.innerHTML = `
        <div class="row">
            <div class="col-md-8">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="bg-light rounded-3 p-3 border-start border-4 border-primary">
                            <label class="form-label fw-bold text-muted">檢驗項目</label>
                            <p class="mb-0 fs-5">${reagent.item}</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="bg-light rounded-3 p-3 border-start border-4 border-info">
                            <label class="form-label fw-bold text-muted">批號</label>
                            <p class="mb-0 fs-5"><code class="bg-white px-3 py-2 rounded-pill">${reagent.lot_number}</code></p>
                        </div>
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="bg-light rounded-3 p-3 border-start border-4 ${expired ? 'border-danger' : 'border-success'}">
                            <label class="form-label fw-bold text-muted">有效期限</label>
                            <p class="mb-0 fs-5 ${expired ? 'text-danger fw-bold' : ''}">
                                ${formatDate(reagent.expiration_date)}
                            </p>
                            ${daysUntilExpiry <= 30 && !expired ? 
                                `<small class="text-warning">剩餘 ${daysUntilExpiry} 天</small>` : ''}
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="bg-light rounded-3 p-3 border-start border-4 border-warning">
                            <label class="form-label fw-bold text-muted">數量</label>
                            <p class="mb-0 fs-5">${reagent.quantity || 1}</p>
                        </div>
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="bg-light rounded-3 p-3 border-start border-4 border-info">
                            <label class="form-label fw-bold text-muted">單位</label>
                            <p class="mb-0 fs-5">${reagent.unit || '-'}</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="bg-light rounded-3 p-3 border-start border-4 border-success">
                            <label class="form-label fw-bold text-muted">供應商</label>
                            <p class="mb-0 fs-5">${reagent.supplier || '-'}</p>
                        </div>
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="bg-light rounded-3 p-3 border-start border-4 border-secondary">
                            <label class="form-label fw-bold text-muted">儲存時間</label>
                            <p class="mb-0 fs-5">${formatDateTime(reagent.stored_date)}</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="bg-light rounded-3 p-3 border-start border-4 border-info">
                            <label class="form-label fw-bold text-muted">狀態</label>
                            <p class="mb-0">
                                <span class="status-badge ${statusClass}">
                                    
                                    ${statusText}
                                </span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card ${expired ? 'border-danger' : 'border-success'} h-100">
                    <div class="card-body text-center d-flex flex-column justify-content-center">
                        <div class="mb-3">
                            
                        </div>
                        <h5 class="card-title ${expired ? 'text-danger' : 'text-success'} mb-3">
                            ${expired ? '已過期' : '使用中'}
                        </h5>
                        <p class="card-text text-muted">
                            ${expired ? '此批號已超過有效期限，請注意使用' : '此批號仍在有效期限內'}
                        </p>
                        ${expired ? '<div class="alert alert-danger mt-3">過期提醒</div>' : ''}
                    </div>
                </div>
            </div>
        </div>
    `;
    
    // 顯示模態框
    const modal = new bootstrap.Modal(document.getElementById('detailModal'));
    modal.show();
}

// 補印試劑標籤函數
function printReagentLabel(item, lotNumber, expirationDate, storedDate, quantity) {
    const printWindow = window.open('', '_blank', 'width=800,height=600');
    
    // 生成多張標籤的HTML內容
    let labelsHTML = '';
    for (let i = 0; i < quantity; i++) {
        labelsHTML += `
            <div class="label">
                <div class="label-header">入庫</div>
                <div class="label-content">
                    <div class="info-row">
                        <span class="info-label">名稱：</span>
                        <span class="info-value">${item}</span>
                        <span class="info-label">有效日期：</span>
                        <span class="info-value">${expirationDate}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">批號：</span>
                        <span class="info-value">${lotNumber}</span>
                        <span class="info-label">入庫日期：</span>
                        <span class="info-value">${storedDate.split('T')[0]}</span>
                    </div>
                </div>
                
                <div class="label-divider"></div>
                
                <div class="label-header">出庫</div>
                <div class="label-content">
                    <div class="info-row">
                        <span class="info-label">出庫日期：</span>
                        <span class="info-value">
                            <div class="blank-line"></div>
                        </span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">出庫人員：</span>
                        <span class="info-value">
                            <div class="blank-line"></div>
                        </span>
                    </div>
                </div>
            </div>
        `;
    }
    
    const labelContent = `
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <title>試劑標籤 - ${quantity}張</title>
            <style>
                @media print {
                    body { 
                        margin: 0; 
                        padding: 0;
                    }
                    .label { 
                        page-break-inside: avoid; 
                        break-inside: avoid;
                    }
                    .no-print {
                        display: none !important;
                    }
                }
                
                body {
                    margin: 0;
                    padding: 0;
                    font-family: "Microsoft JhengHei", Arial, sans-serif;
                    background: white;
                }
                
                .labels-container {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 2mm;
                    padding: 5mm;
                    justify-content: flex-start;
                    align-items: flex-start;
                }
                
                .label {
                    width: 50mm;
                    height: 35mm;
                    border: 0.5mm solid #000;
                    box-sizing: border-box;
                    display: inline-block;
                    margin: 0;
                    background: white;
                    position: relative;
                    overflow: hidden;
                }
                
                .label-header {
                    background: #f0f0f0;
                    text-align: center;
                    font-size: 7pt;
                    font-weight: bold;
                    padding: 1mm 0;
                    border-bottom: 0.3mm solid #000;
                    height: 4mm;
                    line-height: 2mm;
                }
                
                .label-content {
                    padding: 1.5mm;
                }
                
                .info-row {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    margin-bottom: 2mm;
                    height: 3.5mm;
                }
                
                .info-label {
                    font-size: 6pt;
                    font-weight: bold;
                    min-width: 8mm;
                    text-align: left;
                }

// 頁面載入完成後執行
document.addEventListener('DOMContentLoaded', function() {
    console.log('list.html 頁面載入完成，開始初始化...');
    
    // 載入所有試劑資料
    loadAllReagents();
    
    // 綁定事件
    document.getElementById('filterItem').addEventListener('change', filterReagents);
    document.getElementById('filterStatus').addEventListener('change', filterReagents);
    document.getElementById('searchInput').addEventListener('input', filterReagents);
    document.getElementById('refreshBtn').addEventListener('click', loadAllReagents);
    
    // 添加輸入驗證提示
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', function() {
        if (this.value.length > 0) {
            this.style.borderColor = '#7c3aed';
            this.style.boxShadow = '0 0 0 4px rgba(124, 58, 237, 0.1)';
        } else {
            this.style.borderColor = '';
            this.style.boxShadow = '';
        }
    });
    
    console.log('list.html 初始化完成');
});
</script>
