<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>頁籤測試</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>頁籤切換測試</h1>
        
        <!-- 頁籤導航 -->
        <ul class="nav nav-tabs" id="mainTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="entry-tab" data-bs-toggle="tab" data-bs-target="#entry" type="button" role="tab">
                    <i class="fas fa-plus-circle me-2"></i>新增入庫
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="search-records-tab" data-bs-toggle="tab" data-bs-target="#search-records" type="button" role="tab">
                    <i class="fas fa-search me-2"></i>搜尋與紀錄
                </button>
            </li>
        </ul>

        <!-- 頁籤內容 -->
        <div class="tab-content" id="mainTabsContent">
            <!-- 新增入庫頁籤 -->
            <div class="tab-pane fade show active" id="entry" role="tabpanel">
                <div class="card mt-3">
                    <div class="card-body">
                        <h5>新增入庫頁籤</h5>
                        <p>這是新增入庫的內容</p>
                    </div>
                </div>
            </div>

            <!-- 搜尋與紀錄頁籤 -->
            <div class="tab-pane fade" id="search-records" role="tabpanel">
                <div class="card mt-3">
                    <div class="card-body">
                        <h5>搜尋與紀錄頁籤</h5>
                        <p>這是搜尋與紀錄的內容</p>
                        <p id="tabInfo">頁籤已載入</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 頁籤切換測試
        document.addEventListener('DOMContentLoaded', function() {
            console.log('頁面載入完成');
            
            // 測試點擊事件
            document.querySelectorAll('[data-bs-toggle="tab"]').forEach(tab => {
                tab.addEventListener('click', function(e) {
                    console.log('點擊頁籤:', this.id);
                    const targetId = this.getAttribute('data-bs-target');
                    console.log('目標頁籤:', targetId);
                    
                    if (targetId === '#search-records') {
                        console.log('切換到搜尋頁籤');
                        setTimeout(() => {
                            document.getElementById('tabInfo').textContent = '搜尋頁籤已載入 - ' + new Date().toLocaleTimeString();
                        }, 100);
                    }
                });
            });

            // 測試Bootstrap事件
            document.addEventListener('shown.bs.tab', function(e) {
                console.log('Bootstrap頁籤事件:', e.target.id);
                if (e.target.id === 'search-records-tab') {
                    console.log('Bootstrap: 搜尋頁籤已顯示');
                    document.getElementById('tabInfo').textContent = 'Bootstrap事件觸發 - ' + new Date().toLocaleTimeString();
                }
            });
        });
    </script>
</body>
</html>
