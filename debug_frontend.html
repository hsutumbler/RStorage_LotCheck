<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端除錯測試</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button { margin: 5px; padding: 10px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🔍 前端除錯測試頁面</h1>
    
    <div class="debug-section">
        <h3>📊 系統狀態檢查</h3>
        <button onclick="checkSystemStatus()">檢查系統狀態</button>
        <div id="systemStatus"></div>
    </div>
    
    <div class="debug-section">
        <h3>🌐 API 測試</h3>
        <button onclick="testGetAllReagents()">測試獲取所有試劑</button>
        <div id="apiTest"></div>
    </div>
    
    <div class="debug-section">
        <h3>🗄️ 資料庫連接測試</h3>
        <button onclick="testDatabaseConnection()">測試資料庫連接</button>
        <div id="dbTest"></div>
    </div>
    
    <div class="debug-section">
        <h3>📋 資料庫內容</h3>
        <button onclick="loadDatabaseContent()">載入資料庫內容</button>
        <div id="dbContent"></div>
    </div>

    <script>
        function checkSystemStatus() {
            const statusDiv = document.getElementById('systemStatus');
            statusDiv.innerHTML = '<p class="info">正在檢查系統狀態...</p>';
            
            // 檢查瀏覽器相容性
            const checks = {
                'fetch API': typeof fetch !== 'undefined',
                'JSON': typeof JSON !== 'undefined',
                'console': typeof console !== 'undefined',
                'localStorage': typeof localStorage !== 'undefined'
            };
            
            let statusHtml = '<h4>系統檢查結果：</h4><ul>';
            for (const [feature, available] of Object.entries(checks)) {
                const status = available ? '✅' : '❌';
                const color = available ? 'success' : 'error';
                statusHtml += `<li class="${color}">${status} ${feature}</li>`;
            }
            statusHtml += '</ul>';
            
            statusDiv.innerHTML = statusHtml;
        }
        
        function testGetAllReagents() {
            const testDiv = document.getElementById('apiTest');
            testDiv.innerHTML = '<p class="info">正在測試 API...</p>';
            
            fetch('/api/get_all_reagents')
                .then(response => {
                    console.log('API 回應狀態:', response.status);
                    return response.json();
                })
                .then(data => {
                    console.log('API 回應資料:', data);
                    testDiv.innerHTML = `
                        <h4>✅ API 測試成功</h4>
                        <p><strong>狀態碼:</strong> 200</p>
                        <p><strong>成功:</strong> ${data.success}</p>
                        <p><strong>資料筆數:</strong> ${data.data ? data.data.length : 0}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                })
                .catch(error => {
                    console.error('API 測試失敗:', error);
                    testDiv.innerHTML = `
                        <h4>❌ API 測試失敗</h4>
                        <p class="error">錯誤: ${error.message}</p>
                    `;
                });
        }
        
        function testDatabaseConnection() {
            const testDiv = document.getElementById('dbTest');
            testDiv.innerHTML = '<p class="info">正在測試資料庫連接...</p>';
            
            // 透過 API 間接測試資料庫
            fetch('/api/get_all_reagents')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        testDiv.innerHTML = `
                            <h4>✅ 資料庫連接正常</h4>
                            <p>成功從資料庫獲取 ${data.data.length} 筆記錄</p>
                        `;
                    } else {
                        testDiv.innerHTML = `
                            <h4>❌ 資料庫連接異常</h4>
                            <p class="error">錯誤訊息: ${data.message}</p>
                        `;
                    }
                })
                .catch(error => {
                    testDiv.innerHTML = `
                        <h4>❌ 資料庫連接測試失敗</h4>
                        <p class="error">錯誤: ${error.message}</p>
                    `;
                });
        }
        
        function loadDatabaseContent() {
            const contentDiv = document.getElementById('dbContent');
            contentDiv.innerHTML = '<p class="info">正在載入資料庫內容...</p>';
            
            fetch('/api/get_all_reagents')
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.data.length > 0) {
                        let contentHtml = `
                            <h4>📋 資料庫內容 (共 ${data.data.length} 筆)</h4>
                            <table border="1" style="border-collapse: collapse; width: 100%;">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>檢驗項目</th>
                                        <th>批號</th>
                                        <th>有效期限</th>
                                        <th>儲存時間</th>
                                        <th>狀態</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;
                        
                        data.data.forEach(reagent => {
                            const isExpired = new Date(reagent.expiration_date) < new Date();
                            const status = isExpired ? '已過期' : '使用中';
                            const statusColor = isExpired ? 'red' : 'green';
                            
                            contentHtml += `
                                <tr>
                                    <td>${reagent.id}</td>
                                    <td>${reagent.item}</td>
                                    <td><code>${reagent.lot_number}</code></td>
                                    <td>${reagent.expiration_date}</td>
                                    <td>${reagent.stored_date}</td>
                                    <td style="color: ${statusColor}">${status}</td>
                                </tr>
                            `;
                        });
                        
                        contentHtml += '</tbody></table>';
                        contentDiv.innerHTML = contentHtml;
                    } else {
                        contentDiv.innerHTML = `
                            <h4>📋 資料庫內容</h4>
                            <p class="info">資料庫中沒有記錄</p>
                        `;
                    }
                })
                .catch(error => {
                    contentDiv.innerHTML = `
                        <h4>❌ 載入資料庫內容失敗</h4>
                        <p class="error">錯誤: ${error.message}</p>
                    `;
                });
        }
        
        // 頁面載入完成後自動執行一些檢查
        document.addEventListener('DOMContentLoaded', function() {
            console.log('除錯頁面載入完成');
            checkSystemStatus();
        });
    </script>
</body>
</html>
